name: Create VPN Server

env:
  SSH_USER: ""
  SSH_PASS: ""
  OVPN_TCP_PORT: "443"
  OVPN_UDP_PORT: "1194"
  WG_PORT: "51820"
  WS_SSH_PORT: "80"
  ENABLE_WIREGUARD: "true"
  ENABLE_WS_SSH: "true"
  VPN_DNS_1: "1.1.1.1"
  VPN_DNS_2: "1.0.0.1"

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: "ngrok authtoken"
        required: true
      ssh_user:
        description: "SSH username"
        required: false
        default: ""
      ssh_pass:
        description: "SSH password"
        required: false
        default: ""
      enable_wireguard:
        description: "Enable WireGuard"
        required: false
        default: "true"
      enable_ws_ssh:
        description: "Enable WebSocket SSH"
        required: false
        default: "true"

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Resolve credentials & config
        run: |
          INPUT_USER="${{ github.event.inputs.ssh_user }}"
          INPUT_PASS="${{ github.event.inputs.ssh_pass }}"
          ENV_USER="${SSH_USER}"
          ENV_PASS="${SSH_PASS}"

          if [ -n "$INPUT_USER" ]; then FINAL_USER="$INPUT_USER"
          elif [ -n "$ENV_USER" ]; then FINAL_USER="$ENV_USER"
          else FINAL_USER="user$(shuf -i 1000-9999 -n 1)"
          fi

          if [ -n "$INPUT_PASS" ]; then FINAL_PASS="$INPUT_PASS"
          elif [ -n "$ENV_PASS" ]; then FINAL_PASS="$ENV_PASS"
          else FINAL_PASS="$(openssl rand -base64 12 | tr -d '/+=')$(shuf -i 10-99 -n 1)"
          fi

          ENA_WG="${{ github.event.inputs.enable_wireguard }}"
          ENA_WS="${{ github.event.inputs.enable_ws_ssh }}"
          [ -z "$ENA_WG" ] && ENA_WG="${ENABLE_WIREGUARD}"
          [ -z "$ENA_WS" ] && ENA_WS="${ENABLE_WS_SSH}"

          echo "FINAL_USER=$FINAL_USER" >> $GITHUB_ENV
          echo "FINAL_PASS=$FINAL_PASS" >> $GITHUB_ENV
          echo "ENA_WG=$ENA_WG" >> $GITHUB_ENV
          echo "ENA_WS=$ENA_WS" >> $GITHUB_ENV

          PUBLIC_IFACE=$(ip route | grep default | awk '{print $5}' | head -1)
          echo "PUBLIC_IFACE=$PUBLIC_IFACE" >> $GITHUB_ENV

      - name: IP forwarding + iptables
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo iptables -t nat -A POSTROUTING -o $PUBLIC_IFACE -j MASQUERADE
          sudo iptables -A FORWARD -i tun0 -j ACCEPT
          sudo iptables -A FORWARD -o tun0 -j ACCEPT
          sudo iptables -A FORWARD -i tun1 -j ACCEPT
          sudo iptables -A FORWARD -o tun1 -j ACCEPT

      - name: Install packages
        run: |
          sudo apt-get update -qq
          PKGS="openvpn easy-rsa"
          [ "$ENA_WG" = "true" ] && PKGS="$PKGS wireguard"
          [ "$ENA_WS" = "true" ] && PKGS="$PKGS websockify"
          sudo apt-get install -y -qq $PKGS

      - name: Create SSH user
        run: |
          sudo useradd -m -s /bin/bash $FINAL_USER
          echo "$FINAL_USER:$FINAL_PASS" | sudo chpasswd
          sudo systemctl restart ssh

      - name: Start WebSocket SSH bridge
        if: env.ENA_WS == 'true'
        run: |
          sudo websockify --daemon 0.0.0.0:$WS_SSH_PORT localhost:22

      - name: Build PKI
        run: |
          make-cadir ~/openvpn-ca && cd ~/openvpn-ca
          export EASYRSA_BATCH=1
          export EASYRSA_REQ_CN="GH-VPN"

          ./easyrsa init-pki
          ./easyrsa build-ca nopass
          ./easyrsa gen-req server nopass
          ./easyrsa sign-req server server
          ./easyrsa gen-dh
          openvpn --genkey secret pki/ta.key

      - name: Configure + start OpenVPN
        run: |
          sudo openvpn --daemon --config /etc/openvpn/server-tcp.conf || true

      - name: Setup ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/

          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"

          ngrok tcp 22 &
          ngrok tcp 443 &
          ngrok tcp 80 &

      - name: Print full VPN details
        run: |
          sleep 6

          NGROK_API=$(curl -s http://127.0.0.1:4040/api/tunnels)

          get_tunnel () {
            echo "$NGROK_API" | python3 -c ".
            import sys,json
            data=json.load(sys.stdin)
            for t in data.get('tunnels', []):
             if '$1' in t.get('name','') or '$1' in t.get('public_url',''):
             print(t['public_url'].replace('tcp://',''))
             "
          }

          SSH_ADDR=$(get_tunnel ssh)
          OVPN_ADDR=$(get_tunnel 443)
          WS_ADDR=$(get_tunnel 80)

          SSH_HOST=$(echo $SSH_ADDR | cut -d: -f1)
          SSH_PORT=$(echo $SSH_ADDR | cut -d: -f2)

          OVPN_HOST=$(echo $OVPN_ADDR | cut -d: -f1)
          OVPN_PORT=$(echo $OVPN_ADDR | cut -d: -f2)

          WS_HOST=$(echo $WS_ADDR | cut -d: -f1)
          WS_PORT=$(echo $WS_ADDR | cut -d: -f2)

          RUNNER_IP=$(curl -s https://ifconfig.me)

          echo ""
          echo "========================================"
          echo "         VPN SERVER READY"
          echo "========================================"
          echo ""
          echo "CREDENTIALS"
          echo "Username : $FINAL_USER"
          echo "Password : $FINAL_PASS"
          echo ""
          echo "SSH (ngrok)"
          echo "ssh $FINAL_USER@$SSH_HOST -p $SSH_PORT"
          echo ""
          echo "OpenVPN (TCP via ngrok)"
          echo "Remote : $OVPN_HOST $OVPN_PORT"
          echo ""
          echo "OpenVPN (UDP direct)"
          echo "Remote : $RUNNER_IP port $OVPN_UDP_PORT"
          echo ""
          echo "WebSocket SSH"
          echo "ws://$WS_HOST:$WS_PORT"
          echo ""
          echo "========================================"

      - name: Keep alive
        run: sleep 21400
