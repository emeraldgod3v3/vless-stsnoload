name: ðŸ” VPN Server

# ============================================================
#  EASY CUSTOMIZATION â€” edit these variables before running
# ============================================================
env:
  # â”€â”€ User credentials â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Leave SSH_USER / SSH_PASS empty ("") to auto-generate them
  SSH_USER:   "bilyabits"                  # e.g. "cjuser"
  SSH_PASS:   "bilyabits"                  # e.g. "mypassword"

  # â”€â”€ Ports â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  OVPN_TCP_PORT:  "443"           # OpenVPN TCP port
  OVPN_UDP_PORT:  "1194"          # OpenVPN UDP port
  WG_PORT:        "51820"         # WireGuard UDP port
  WS_SSH_PORT:    "80"          # WebSocket SSH port (websockify)

  # â”€â”€ Features â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  ENABLE_WIREGUARD:   "true"      # "true" | "false"
  ENABLE_WS_SSH:      "true"      # "true" | "false"

  # â”€â”€ DNS pushed to VPN clients â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  VPN_DNS_1:  "1.1.1.1"
  VPN_DNS_2:  "1.0.0.1"
# ============================================================

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: "ngrok authtoken (ngrok.com â†’ free signup)"
        required: true
      ssh_user:
        description: "SSH username (leave blank to auto-generate)"
        required: true
        default: ""
      ssh_pass:
        description: "SSH password (leave blank to auto-generate)"
        required: true
        default: ""
      enable_wireguard:
        description: "Enable WireGuard? (true/false)"
        required: false
        default: "true"
      enable_ws_ssh:
        description: "Enable WebSocket SSH? (true/false)"
        required: false
        default: "true"

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 0. RESOLVE CREDENTIALS
      #    workflow_dispatch inputs override env vars
      #    empty = auto-generate
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”¢ Resolve credentials & config
        run: |
          INPUT_USER="${{ github.event.inputs.ssh_user }}"
          INPUT_PASS="${{ github.event.inputs.ssh_pass }}"
          ENV_USER="${SSH_USER}"
          ENV_PASS="${SSH_PASS}"

          if   [ -n "$INPUT_USER" ]; then FINAL_USER="$INPUT_USER"
          elif [ -n "$ENV_USER"   ]; then FINAL_USER="$ENV_USER"
          else FINAL_USER="user$(shuf -i 1000-9999 -n 1)"
          fi

          if   [ -n "$INPUT_PASS" ]; then FINAL_PASS="$INPUT_PASS"
          elif [ -n "$ENV_PASS"   ]; then FINAL_PASS="$ENV_PASS"
          else FINAL_PASS="$(openssl rand -base64 12 | tr -d '/+=')$(shuf -i 10-99 -n 1)"
          fi

          ENA_WG="${{ github.event.inputs.enable_wireguard }}"
          ENA_WS="${{ github.event.inputs.enable_ws_ssh }}"
          [ -z "$ENA_WG" ] && ENA_WG="${ENABLE_WIREGUARD}"
          [ -z "$ENA_WS" ] && ENA_WS="${ENABLE_WS_SSH}"

          echo "FINAL_USER=$FINAL_USER"   >> $GITHUB_ENV
          echo "FINAL_PASS=$FINAL_PASS"   >> $GITHUB_ENV
          echo "ENA_WG=$ENA_WG"           >> $GITHUB_ENV
          echo "ENA_WS=$ENA_WS"           >> $GITHUB_ENV

          PUBLIC_IFACE=$(ip route | grep default | awk '{print $5}' | head -1)
          echo "PUBLIC_IFACE=$PUBLIC_IFACE" >> $GITHUB_ENV

          echo "============================================"
          echo "  User   : $FINAL_USER"
          echo "  Pass   : $FINAL_PASS"
          echo "  WG     : $ENA_WG"
          echo "  WS-SSH : $ENA_WS"
          echo "  Iface  : $PUBLIC_IFACE"
          echo "============================================"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 1. SYSTEM PREP
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”§ IP forwarding + iptables
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo iptables -t nat -A POSTROUTING -o $PUBLIC_IFACE -j MASQUERADE
          sudo iptables -A FORWARD -i tun0 -j ACCEPT
          sudo iptables -A FORWARD -o tun0 -j ACCEPT
          sudo iptables -A FORWARD -i tun1 -j ACCEPT
          sudo iptables -A FORWARD -o tun1 -j ACCEPT
          echo "âœ… IP forwarding on $PUBLIC_IFACE"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 2. INSTALL PACKAGES
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“¦ Install packages
        run: |
          sudo apt-get update -qq
          PKGS="openvpn easy-rsa"
          [ "$ENA_WG" = "true" ] && PKGS="$PKGS wireguard"
          [ "$ENA_WS" = "true" ] && PKGS="$PKGS websockify"
          sudo apt-get install -y -qq $PKGS
          echo "âœ… Packages installed"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 3. CREATE SSH USER
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ‘¤ Create SSH user
        run: |
          sudo useradd -m -s /bin/bash $FINAL_USER
          echo "$FINAL_USER:$FINAL_PASS" | sudo chpasswd

          sudo tee -a /etc/ssh/sshd_config << EOF

          Match User $FINAL_USER
              PasswordAuthentication yes
              AllowTcpForwarding yes
              GatewayPorts yes
              PermitTunnel yes
          EOF

          sudo systemctl restart sshd
          echo "âœ… SSH user '$FINAL_USER' ready"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 4. WEBSOCKET SSH
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”Œ Start WebSocket SSH bridge
        if: env.ENA_WS == 'true'
        run: |
          sudo websockify \
            --daemon \
            --log-file /tmp/websockify.log \
            0.0.0.0:$WS_SSH_PORT \
            localhost:22
          sleep 2
          ss -tlnp | grep $WS_SSH_PORT \
            && echo "âœ… WebSocket SSH on :$WS_SSH_PORT" \
            || echo "âš ï¸ websockify failed â€” check /tmp/websockify.log"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 5. OPENVPN PKI
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ”‘ Build PKI
        run: |
          make-cadir ~/openvpn-ca && cd ~/openvpn-ca
          cat > vars << 'EOF'
          set_var EASYRSA_ALGO     ec
          set_var EASYRSA_CURVE    prime256v1
          set_var EASYRSA_REQ_CN   "GH-VPN"
          set_var EASYRSA_BATCH    1
          EOF

          ./easyrsa init-pki
          ./easyrsa build-ca nopass
          ./easyrsa gen-req server nopass
          ./easyrsa sign-req server server
          ./easyrsa gen-dh
          ./easyrsa gen-req client1 nopass
          ./easyrsa sign-req client client1
          openvpn --genkey secret pki/ta.key

          sudo cp pki/ca.crt              /etc/openvpn/ca.crt
          sudo cp pki/issued/server.crt   /etc/openvpn/server.crt
          sudo cp pki/private/server.key  /etc/openvpn/server.key
          sudo cp pki/dh.pem              /etc/openvpn/dh.pem
          sudo cp pki/ta.key              /etc/openvpn/ta.key
          echo "âœ… PKI done"

      - name: âš™ï¸ Configure + start OpenVPN
        run: |
          BASE="
          ca   /etc/openvpn/ca.crt
          cert /etc/openvpn/server.crt
          key  /etc/openvpn/server.key
          dh   /etc/openvpn/dh.pem
          tls-auth /etc/openvpn/ta.key 0
          keepalive 10 120
          cipher AES-256-GCM
          auth SHA256
          compress lz4-v2
          push \"compress lz4-v2\"
          push \"dhcp-option DNS ${VPN_DNS_1}\"
          push \"dhcp-option DNS ${VPN_DNS_2}\"
          push \"redirect-gateway def1 bypass-dhcp\"
          user nobody
          group nogroup
          persist-key
          persist-tun
          verb 3"

          sudo tee /etc/openvpn/server-tcp.conf << EOF
          port ${OVPN_TCP_PORT}
          proto tcp
          dev tun0
          server 10.8.0.0 255.255.255.0
          status /var/log/openvpn-tcp-status.log
          explicit-exit-notify
          $BASE
          EOF

          sudo tee /etc/openvpn/server-udp.conf << EOF
          port ${OVPN_UDP_PORT}
          proto udp
          dev tun1
          server 10.9.0.0 255.255.255.0
          status /var/log/openvpn-udp-status.log
          explicit-exit-notify 1
          $BASE
          EOF

          sudo openvpn --daemon --config /etc/openvpn/server-tcp.conf
          sudo openvpn --daemon --config /etc/openvpn/server-udp.conf
          sleep 3
          ip link show tun0 && echo "âœ… tun0 TCP up" || echo "âš ï¸ tun0 failed"
          ip link show tun1 && echo "âœ… tun1 UDP up" || echo "âš ï¸ tun1 failed"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 6. WIREGUARD
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸŒ Setup WireGuard
        if: env.ENA_WG == 'true'
        run: |
          wg genkey | sudo tee /etc/wireguard/server_private.key | \
            wg pubkey | sudo tee /etc/wireguard/server_public.key
          wg genkey | tee /tmp/wg_client_priv | wg pubkey | tee /tmp/wg_client_pub

          SERVER_PRIV=$(sudo cat /etc/wireguard/server_private.key)
          CLIENT_PUB=$(cat /tmp/wg_client_pub)

          sudo tee /etc/wireguard/wg0.conf << EOF
          [Interface]
          Address    = 10.10.0.1/24
          ListenPort = ${WG_PORT}
          PrivateKey = $SERVER_PRIV
          PostUp     = iptables -t nat -A POSTROUTING -o ${PUBLIC_IFACE} -j MASQUERADE; iptables -A FORWARD -i wg0 -j ACCEPT
          PostDown   = iptables -t nat -D POSTROUTING -o ${PUBLIC_IFACE} -j MASQUERADE; iptables -D FORWARD -i wg0 -j ACCEPT

          [Peer]
          PublicKey  = $CLIENT_PUB
          AllowedIPs = 10.10.0.2/32
          EOF

          sudo systemctl enable --now wg-quick@wg0
          echo "âœ… WireGuard on UDP ${WG_PORT}"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 7. NGROK TUNNELS
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸŒ Setup ngrok
        run: |
          curl -sL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | \
            sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | \
            sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"

          cat > /tmp/ngrok.yml << EOF
          version: "2"
          tunnels:
            ssh-plain:
              proto: tcp
              addr: 22
            openvpn-tcp:
              proto: tcp
              addr: ${OVPN_TCP_PORT}
            openvpn-udp:
              proto: tcp
              addr: ${OVPN_UDP_PORT}
          EOF

          if [ "$ENA_WS" = "true" ]; then
            cat >> /tmp/ngrok.yml << EOF
            ws-ssh:
              proto: tcp
              addr: ${WS_SSH_PORT}
          EOF
          fi

          ngrok start --all --config /tmp/ngrok.yml --log /tmp/ngrok.log &
          sleep 8
          echo "âœ… ngrok tunnels up"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 8. GENERATE CLIENT CONFIGS
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“„ Generate client configs
        run: |
          NGROK_API=$(curl -s http://127.0.0.1:4040/api/tunnels)

          get_tunnel() {
            echo "$NGROK_API" | python3 -c "
          import sys,json
          tunnels=json.load(sys.stdin).get('tunnels',[])
          for t in tunnels:
              if t['name']=='$1': print(t['public_url'].replace('tcp://',''))
          " 2>/dev/null || echo "N/A:0"
          }

          SSH_ADDR=$(get_tunnel ssh-plain)
          OVPN_ADDR=$(get_tunnel openvpn-tcp)
          WS_ADDR=$(get_tunnel ws-ssh)

          SSH_HOST=$(echo $SSH_ADDR | cut -d: -f1)
          SSH_PORT=$(echo $SSH_ADDR | cut -d: -f2)
          OVPN_HOST=$(echo $OVPN_ADDR | cut -d: -f1)
          OVPN_PORT=$(echo $OVPN_ADDR | cut -d: -f2)
          WS_HOST=$(echo $WS_ADDR | cut -d: -f1)
          WS_PORT=$(echo $WS_ADDR | cut -d: -f2)

          echo "SSH_HOST=$SSH_HOST"   >> $GITHUB_ENV
          echo "SSH_PORT=$SSH_PORT"   >> $GITHUB_ENV
          echo "OVPN_HOST=$OVPN_HOST" >> $GITHUB_ENV
          echo "OVPN_PORT=$OVPN_PORT" >> $GITHUB_ENV
          echo "WS_HOST=$WS_HOST"     >> $GITHUB_ENV
          echo "WS_PORT=$WS_PORT"     >> $GITHUB_ENV

          # client1.ovpn
          CA=$(sudo cat /etc/openvpn/ca.crt)
          CERT=$(cat ~/openvpn-ca/pki/issued/client1.crt)
          KEY=$(cat ~/openvpn-ca/pki/private/client1.key)
          TA=$(sudo cat /etc/openvpn/ta.key)

          cat > /tmp/client1.ovpn << EOF
          client
          dev tun
          proto tcp
          remote $OVPN_HOST $OVPN_PORT
          resolv-retry infinite
          nobind
          persist-key
          persist-tun
          remote-cert-tls server
          cipher AES-256-GCM
          auth SHA256
          compress lz4-v2
          verb 3
          key-direction 1
          <ca>
          $CA
          </ca>
          <cert>
          $CERT
          </cert>
          <key>
          $KEY
          </key>
          <tls-auth>
          $TA
          </tls-auth>
          EOF

          # WireGuard client
          if [ "$ENA_WG" = "true" ]; then
            SERVER_PUB=$(sudo cat /etc/wireguard/server_public.key)
            CLIENT_PRIV=$(cat /tmp/wg_client_priv)
            RUNNER_IP=$(curl -s https://ifconfig.me)
            cat > /tmp/wg-client.conf << EOF
          [Interface]
          PrivateKey = $CLIENT_PRIV
          Address    = 10.10.0.2/24
          DNS        = ${VPN_DNS_1}

          [Peer]
          PublicKey           = $SERVER_PUB
          Endpoint            = $RUNNER_IP:${WG_PORT}
          AllowedIPs          = 0.0.0.0/0
          PersistentKeepalive = 25
          EOF
          fi

          echo "âœ… Client configs ready"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 9. TMATE
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ–¥ï¸ tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
          detached: true

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # 10. PRINT EVERYTHING
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ðŸ“‹ Connection info
        run: |
          sleep 5
          RUNNER_IP=$(curl -s https://ifconfig.me)

          echo ""
