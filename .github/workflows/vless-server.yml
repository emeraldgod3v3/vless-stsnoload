name: VLESS Temp Server

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Custom name for this server (used in VLESS tag)"
        required: true
        default: "STSNOLOAD"
      port:
        description: "Container port to expose"
        required: false
        default: "8080"
      ws_path:
        description: "WebSocket path e.g. /vless"
        required: false
        default: "/"

jobs:
  run-vless:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Generate UUID
        id: uuid
        run: |
          UUID=$(uuidgen)
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          echo "Generated UUID: $UUID"

      - name: Pull Docker image
        run: docker pull docker.io/jericoo/jerico

      - name: Inspect image metadata
        run: |
          echo "--- Exposed Ports ---"
          docker inspect docker.io/jericoo/jerico | jq -r '.[0].Config.ExposedPorts // "none listed"'
          echo "--- Env Vars ---"
          docker inspect docker.io/jericoo/jerico | jq -r '.[0].Config.Env[]'

      - name: Run VLESS container
        run: |
          docker run -d \
            --name vless \
            -e UUID=${{ steps.uuid.outputs.uuid }} \
            -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} \
            docker.io/jericoo/jerico
          sleep 6

      - name: Container logs
        run: docker logs vless

      - name: Install cloudflared
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start tunnel and print VLESS config
        run: |
          cloudflared tunnel \
            --url http://localhost:${{ github.event.inputs.port }} \
            --no-autoupdate \
            --logfile /tmp/cf.log \
            2>&1 &

          echo "Waiting for tunnel URL..."
          for i in $(seq 1 20); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Tunnel URL not found. Dumping cf.log:"
            cat /tmp/cf.log
            exit 1
          fi

          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          UUID="${{ steps.uuid.outputs.uuid }}"
          WS_PATH="${{ github.event.inputs.ws_path }}"
          SERVICE_NAME="${{ github.event.inputs.service_name }}"
          SNI="api.paymaya.com"
          PROXY_HOST="google.com"
          PROXY_PORT="443"
          PATH_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$WS_PATH")

          VLESS_LINK="vless://${UUID}@${HOST}:443?encryption=none&security=tls&sni=${SNI}&type=ws&host=${PROXY_HOST}&path=${PATH_ENC}&fp=chrome#${SERVICE_NAME}"

          echo "--------------------------------------"
          echo "SERVICE    : $SERVICE_NAME"
          echo "TUNNEL URL : $TUNNEL_URL"
          echo "HOST       : $HOST"
          echo "PORT       : 443 (TLS via cloudflared)"
          echo "UUID       : $UUID"
          echo "WS PATH    : $WS_PATH"
          echo "SNI        : $SNI"
          echo "PROXY HOST : $PROXY_HOST:$PROXY_PORT"
          echo "--------------------------------------"
          echo "VLESS LINK :"
          echo "$VLESS_LINK"
          echo "--------------------------------------"

      - name: Keep alive
        run: |
          while true; do
            STATUS=$(docker inspect -f '{{.State.Status}}' vless 2>/dev/null || echo "gone")
            echo "[$(date -u +%H:%M:%S)] Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "Container stopped. Dumping logs:"
              docker logs vless
              exit 1
            fi
            sleep 60
          done
